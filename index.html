<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/png" href="/favicon.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Calculator</title>
</head>

<body>

	<canvas id="canvas" width="500" height="500"
		style="border:1px solid #000000; background-color: aliceblue;"></canvas>
	<div>
		<button id="update_button">Update</button><label type="text" id="error_message" style="color: red"></label><br>
		y=<input type="text" id="equation" value="1/(x+1)"><br>
		<label>X min:</label> <input type="number" id="x_min" value="-10" placeholder="-10"><br>
		<label>X max:</label> <input type="number" id="x_max" value="10" placeholder="10"><br>
		<label>Y min:</label> <input type="number" id="y_min" value="-10" placeholder="-10"><br>
		<label>Y max:</label> <input type="number" id="y_max" value="10" placeholder="10"><br>
		Drawing steps:<input type="number" id="drawing_steps" value="10000" placeholder="10000"><br>
	</div>
	<script type="module" src="/src/main.ts">
	</script>
</body>

</html>
