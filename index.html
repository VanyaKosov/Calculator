<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/png" href="/favicon.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Calculator</title>
</head>

<style>
	th.right {
		text-align: right;
	}

	th.center {
		text-align: center;
	}

	th.left {
		text-align: left;
	}

	th.top {
		vertical-align: top;
	}

	th.right-top {
		text-align: right;
		vertical-align: top;
	}

	body {
		background-color: #FAFAFA;
	}
</style>

<body>
	<table>
		<th class="top">
			<table>
				<tr>
					<th class="right">
						<button id="update_button">Update</button>
					</th>
					<th class="center">
						<a href="https://github.com/VanyaKosov/calculator#supported-operations"
							target="_blank">Reference</a>
					</th>
				</tr>
				<tr>
					<th class="right">
						y=
					</th>
					<th class="left">
						<input type="text" id="equation" value="(0.5*x-2)*(0.5*x)^2*(x+2)" spellcheck="false">
					</th>
				</tr>
				<tr>
					<th class="right">
						X min:
					</th>
					<th class="left">
						<input type="number" id="x_min" value="-10" placeholder="-10">
					</th>
				</tr>
				<tr>
					<th class="right">
						X max:
					</th>
					<th class="left">
						<input type="number" id="x_max" value="10" placeholder="10">
					</th>
				</tr>
				<tr>
					<th class="right">
						Y min:
					</th>
					<th class="left">
						<input type="number" id="y_min" value="-10" placeholder="-10">
					</th>
				</tr>
				<tr>
					<th class="right">
						Y max:
					</th>
					<th class="left">
						<input type="number" id="y_max" value="10" placeholder="10">
					</th>
				</tr>
				<tr>
					<th class="right">
						Drawing steps:
					</th>
					<th class="left">
						<input type="number" id="drawing_steps" value="10000" placeholder="10000">
					</th>
				</tr>
				<tr>
					<th class="right">
						Derivative at x=
					</th>
					<th class="left">
						<input type="number" , id="derivative_x"><br>
					</th>
				</tr>
				<tr>
					<th class="right">
						is:
					</th>
					<th class="left">
						<label type="text" id="derivative_value"></label>
					</th>
				</tr>
				<tr>
					<th class="right">
						Function value at x=
					</th>
					<th class="left">
						<input type="number" id="evaluation_x">
					</th>
				</tr>
				<tr>
					<th class="right">
						is:
					</th>
					<th class="left">
						<label type="text" id="evaluation_y"></label></label>
					</th>
				</tr>
				<tr>
					<th class="right">
						Integral from x=
					</th>
					<th class="left">
						<input type="number" id="integral_from"><br>
					</th>
				</tr>
				<tr>
					<th class="right">
						to x=
					</th>
					<th class="left">
						<input type="number" id="integral_to"><br>
					</th>
				</tr>
				<tr>
					<th class="right">
						is:
					</th>
					<th class="left">
						<label type="text" id="integral_value"></label>
					</th>
				</tr>
				<tr>
					<th class="right">
						Show roots
					</th>
					<th class="left">
						<input type="checkbox" id="show_roots"></label>
					</th>
				</tr>
				<tr>
					<th class="right-top">
						roots:
					</th>
					<th class="left">
						<table id="root_list"></table>
					</th>
				</tr>
			</table>
		</th>
		<th class="top">
			<canvas id="canvas" width="500rem" height="500rem"
				style="border:0.1rem solid #263238; background-color: #ECEFF1;"></canvas><br>
			<label type="text" id="error_message" style="color: #F44336" size="20rem"></label>
		</th>
	</table>
	<script type="module" src="/src/main.ts">
	</script>
</body>

</html>
